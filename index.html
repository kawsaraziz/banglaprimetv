<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <header>
        <div style="font-size: 24px; margin-bottom: 10px;">Bangla Prime</div>
        <input type="text" class="search-box" placeholder="🔍 চ্যানেল সার্চ করুন...">
    </header>

    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" style="color:#1877f2"><i class="fas fa-home"></i></a>
        <a href="video.html"><i class="fas fa-video"></i></a>
    </nav>

    <script>
        const content = [
            { type: 'video', name: "Bangla Prime News", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { type: 'post', name: "Admin", text: "আজকের আবহাওয়া কেমন লাগছে আপনাদের?" },
            { type: 'video', name: "Bangla Prime TV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        const feed = document.getElementById('feed');
        content.forEach((item, i) => {
            if(item.type === 'video') {
                feed.innerHTML += `<div class="card"><div class="header-info"><div class="profile-img"></div><b>${item.name}</b></div><video id="v-${i}" controls playsinline></video></div>`;
                setTimeout(() => { const v = document.getElementById(`v-${i}`); const hls = new Hls(); hls.loadSource(item.url); hls.attachMedia(v); }, 100);
            } else {
                feed.innerHTML += `<div class="card"><div class="header-info"><div class="profile-img"></div><b>${item.name}</b></div><p style="padding:10px;">${item.text}</p></div>`;
            }
        });
    </script>
</body>
</html>
