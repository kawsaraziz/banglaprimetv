<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* হেডার */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .logo-box { font-weight: bold; color: #ff0000; }
        
        /* মেইন কন্টেইনার */
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .left-section { flex: 3; padding: 10px; display: flex; flex-direction: column; }
        
        /* পোস্টার ও প্লেয়ার */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #startup-poster, #poster-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 20; }
        #videoPlayer { width: 100%; height: 100%; }
        
        /* ওয়াটারমার্ক */
        .watermark { position: absolute; top: 15px; right: 20px; font-size: 20px; color: rgba(255, 255, 255, 0.3); animation: move 15s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes move { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-20vw, 10vh); } }

        /* স্ক্রল টেক্সট */
        .scroll-wrapper { margin: 10px 0; padding: 5px 15px; border: 1px solid #333; border-radius: 20px; background: #111; flex-shrink: 0; }
        
        /* চ্যানেল সাইডবার */
        .channel-sidebar { flex: 1; min-width: 300px; border-left: 1px solid #333; overflow-y: auto; }
        .channel-list { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .channel-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: #111; border-radius: 12px; cursor: pointer; border: 1px solid #333; }
        .channel-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            .channel-sidebar { height: 400px; border-left: none; border-top: 1px solid #333; }
            .channel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .channel-item { aspect-ratio: 1/1; flex-direction: column; font-size: 11px; }
            .channel-logo { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <div id="startup-poster"><img src="YOUR_STARTUP_IMAGE_URL" alt="Loading..."></div>

    <div class="header">
        <div class="logo-box">📺 বাংলা প্রাইম</div>
    </div>

    <div class="wrapper">
        <div class="left-section">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <img id="poster-img" src="" alt="Poster">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee>স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        // ৩ সেকেন্ড স্টার্টআপ পোস্টার
        setTimeout(() => { document.getElementById('startup-poster').style.display = 'none'; }, 3000);

        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');

        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => { poster.src = ch.poster; poster.style.display = 'block'; play(ch.url); };
                list.appendChild(div);
                if(i === 0) { poster.src = ch.poster; play(ch.url); }
            });
        });

        function play(url) {
            video.onplay = () => poster.style.display = 'none';
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
