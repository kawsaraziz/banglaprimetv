<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .player-fixed { position: sticky; top: 0; z-index: 100; }
        .active-red { border: 2px solid #ff0000; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex items-center justify-between bg-black">
        <h1 class="text-[#ff0000] font-bold text-2xl">NAHIDFLIX</h1>
        <input type="text" id="searchBox" onkeyup="searchCh()" placeholder="Search..." class="bg-[#1a1a1a] px-4 py-2 rounded-full text-sm w-32 border border-gray-800 outline-none">
    </header>

    <div class="player-fixed w-full aspect-video bg-black border-b-2 border-red-700">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay"></iframe>
    </div>

    <div id="catBar" class="flex gap-4 p-4 overflow-x-auto scroll-hide bg-[#000]"></div>

    <div id="mainContent" class="p-4"></div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i><p class="text-[10px]">Home</p></button>
        <button onclick="toggleMenu()"><i class="fas fa-bars"></i><p class="text-[10px]">Menu</p></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i><p class="text-[10px]">Favs</p></button>
    </footer>

    <div id="sideMenu" class="hidden fixed inset-0 bg-black z-[110] p-6">
        <button onclick="toggleMenu()" class="text-2xl mb-6"><i class="fas fa-times"></i></button>
        <div id="menuItems" class="space-y-6"></div>
    </div>

    <script>
        let channels = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];

        // ১. ডেটা লোড করা
        fetch('channels.json')
            .then(res => res.json())
            .then(data => { channels = data; renderChannels(channels); renderMenu(); });

        // ২. চ্যানেল রেন্ডার
        function renderChannels(data) {
            const container = document.getElementById('mainContent');
            container.innerHTML = '';
            data.forEach(ch => {
                container.innerHTML += `
                    <div class="flex items-center gap-4 bg-[#111] p-3 rounded-lg mb-3 border border-gray-800" onclick="play('${ch.url}')">
                        <img src="${ch.logo}" class="w-12 h-12 rounded">
                        <div class="flex-1">
                            <h3 class="text-sm font-bold">${ch.name}</h3>
                            ${ch.isLive ? '<span class="text-[8px] text-red-500 font-bold">● ON AIR</span>' : ''}
                        </div>
                        <button onclick="toggleFav(${ch.id}, event)"><i class="fas fa-heart ${favs.includes(ch.id) ? 'text-red-500' : 'text-gray-500'}"></i></button>
                    </div>`;
            });
        }

        // ৩. প্লেয়ার ফাংশন
        function play(url) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }

        // ৪. মেনু ও ট্যাব ফাংশন
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }
        
        function renderMenu() {
            const menu = document.getElementById('menuItems');
            const cats = [...new Set(channels.map(c => c.category))];
            menu.innerHTML = cats.map(c => `<div class="text-xl border-b border-gray-800 pb-2" onclick="filterCat('${c}'); toggleMenu()">${c}</div>`).join('');
        }

        function filterCat(cat) { renderChannels(channels.filter(c => c.category === cat)); }

        function showFavs() { renderChannels(channels.filter(c => favs.includes(c.id))); }

        function toggleFav(id, e) {
            e.stopPropagation();
            if(favs.includes(id)) favs = favs.filter(f => f !== id);
            else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            renderChannels(channels);
        }

        function searchCh() {
            const v = document.getElementById('searchBox').value.toLowerCase();
            renderChannels(channels.filter(c => c.name.toLowerCase().includes(v)));
        }
    </script>
</body>
</html>
