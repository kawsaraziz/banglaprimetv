<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* হেডার (স্থির) */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .search-box { padding: 5px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; }
        
        /* মেইন কন্টেইনার */
        .wrapper { display: flex; height: calc(100vh - 60px); }
        
        /* প্লেয়ার সেকশন */
        .player-section { flex: 4; display: flex; flex-direction: column; padding: 15px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; }
        #poster-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        
        /* ওয়াটারমার্ক অ্যানিমেশন */
        .watermark { position: absolute; top: 15px; right: 20px; color: rgba(255,255,255,0.7); font-weight: bold; font-size: 18px; z-index: 10; animation: fade 2s infinite alternate; }
        @keyframes fade { from { opacity: 0.3; } to { opacity: 1; } }

        /* স্ক্রলিং টেক্সট (বক্সসহ স্থির) */
        .scroll-wrapper { margin: 10px 0; padding: 5px 15px; border: 1px solid #444; border-radius: 20px; background: #111; }
        .scrolling-text { font-size: 12px; color: #fff; }

        /* চ্যানেল লিস্ট (স্ক্রল হবে) */
        .channel-sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; border-left: 1px solid #333; overflow: hidden; }
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .channel-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #111; border-radius: 8px; cursor: pointer; border: 1px solid #333; }
        .channel-logo { width: 40px; height: 40px; border-radius: 50%; background: #444; object-fit: cover; }

        /* পোর্ট্রেট মোড */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            .player-section { position: sticky; top: 60px; z-index: 900; background: var(--bg); }
            .channel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow: visible; }
        }
    </style>
</head>
<body>

    <div class="header">📺 <b>MEDIA</b> <input type="text" class="search-box" placeholder="সার্চ..."></div>

    <div class="wrapper">
        <div class="player-section">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <img id="poster-img" src="" alt="Poster">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee class="scrolling-text">স্বাগতম! এখান থেকে চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');

        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => { poster.src = ch.poster; poster.style.display = 'block'; play(ch.url); };
                list.appendChild(div);
                if(i === 0) { poster.src = ch.poster; play(ch.url); }
            });
        });

        function play(url) {
            video.onplay = () => poster.style.display = 'none';
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
