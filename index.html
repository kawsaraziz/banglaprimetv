<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bongo Flex — বাংলার লাইভ টিভি</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --bg: #0a0a0f; --bg2: #111118; --red: #e50914; --text: #fff; --border: #2a2a35; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
    
    /* Navbar & Search */
    .navbar { display: flex; align-items: center; padding: 15px; background: var(--bg2); }
    .logo { color: var(--red); font-weight: 800; font-size: 1.2rem; }
    .search-box { flex: 1; margin-left: 15px; padding: 8px; border-radius: 20px; border: none; background: #222; color: #fff; }

    /* Player */
    .player-container { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; justify-content: center; align-items: center; }
    #video-player { width: 100%; height: 100%; }

    /* Grid */
    .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
    .card { background: var(--bg2); padding: 5px; border-radius: 8px; text-align: center; font-size: 0.8rem; }
    .card img { width: 100%; border-radius: 5px; }

    /* Footer */
    footer { text-align: center; padding: 20px; font-size: 0.7rem; color: #666; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">BongoFlex</div>
    <input type="text" class="search-box" placeholder="চ্যানেল খুঁজুন...">
  </div>

  <div class="player-container">
    <video id="video-player" controls autoplay></video>
  </div>

  <div class="channel-grid" id="channel-grid"></div>

  <footer>© 2026 Bongo Flex | Powered By Kawsar Aziz</footer>

<script>
  async function loadChannels() {
    try {
      const response = await fetch('channels.json');
      const channels = await response.json();
      const grid = document.getElementById('channel-grid');
      const video = document.getElementById('video-player');

      channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${ch.logo}">${ch.name}`;
        div.onclick = () => {
          // HLS Player Setup
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(ch.stream_url);
            hls.attachMedia(video);
            video.play();
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = ch.stream_url;
            video.play();
          }
        };
        grid.appendChild(div);
      });
    } catch (e) { console.error("Error loading channels", e); }
  }
  loadChannels();
</script>

</body>
</html>
