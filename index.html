<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .logo-box { font-weight: bold; color: #ff0000; }
        .search-box { padding: 5px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; width: 120px; }
        
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        .left-section { flex: 3; padding: 10px; display: flex; flex-direction: column; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; object-fit: contain; }
        
        .watermark { position: absolute; top: 10px; left: 10px; font-size: 1.5vw; color: rgba(255, 255, 255, 0.2); animation: move 15s linear infinite; pointer-events: none; z-index: 10; }
        @keyframes move { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(40vw, 20vh); } }

        .scroll-wrapper { margin: 10px 0; padding: 2px 10px; border: 1px solid #333; border-radius: 15px; background: #111; flex-shrink: 0; }
        .scrolling-text { font-size: 11px; }

        .channel-sidebar { flex: 1; min-width: 300px; border-left: 1px solid #333; overflow-y: auto; }
        .channel-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .channel-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #111; border-radius: 8px; cursor: pointer; border: 1px solid #333; }
        .channel-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            /* চ্যানেল লিস্টকে স্ক্রল টেক্সট এর উপরে আনা হয়েছে */
            .channel-sidebar { order: -1; border-left: none; border-bottom: 1px solid #333; max-height: 300px; }
            .channel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .channel-item { aspect-ratio: 1/1; flex-direction: column; justify-content: center; text-align: center; font-size: 10px; }
            .channel-logo { width: 50px; height: 50px; margin-bottom: 5px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-box">📺 বাংলা প্রাইম</div>
        <input type="text" class="search-box" placeholder="সার্চ...">
    </div>

    <div class="wrapper">
        <div class="left-section">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee class="scrolling-text">স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => play(ch.url);
                list.appendChild(div);
            });
            if(data.length > 0) play(data[0].url);
        });

        function play(url) {
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
