<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: sans-serif; }
        .snap-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .snap-item { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .overlay { position: absolute; bottom: 80px; left: 20px; color: white; z-index: 10; width: 80%; }
        .actions { position: absolute; bottom: 100px; right: 15px; color: white; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .logo-gradient { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-4 z-50 flex justify-between items-center bg-transparent">
        <h1 class="text-2xl font-bold logo-gradient">Bangla Prime</h1>
        <i class="fas fa-volume-up text-white" id="mute-btn"></i>
    </header>

    <div id="app" class="snap-container"></div>

    <nav class="fixed bottom-0 w-full flex justify-around p-4 bg-black/80 border-t border-gray-800 text-white text-xl z-50">
        <i class="fas fa-home"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user-circle"></i>
    </nav>

    <script>
        async function loadData() {
            try {
                const res = await fetch('channels.json');
                const channels = await res.json();
                const app = document.getElementById('app');

                channels.forEach((ch, index) => {
                    const div = document.createElement('div');
                    div.className = "snap-item";
                    div.innerHTML = `
                        <video id="v-${index}" class="w-full h-full object-cover" playsinline muted></video>
                        <div class="overlay">
                            <h2 class="font-bold text-lg">${ch.name}</h2>
                            <p class="text-sm opacity-70">আপনার প্রিয় টিভি চ্যানেলটি দেখুন সরাসরি বাংলা প্রাইম এ।</p>
                        </div>
                        <div class="actions text-center">
                            <i class="fas fa-heart"></i><span class="block text-[10px]">৯৯</span>
                            <i class="fas fa-comment"></i><span class="block text-[10px]">৫</span>
                            <i class="fas fa-share"></i><span class="block text-[10px]">২</span>
                        </div>
                    `;
                    app.appendChild(div);

                    const video = document.getElementById(`v-${index}`);
                    const hls = new Hls();
                    hls.loadSource(ch.url);
                    hls.attachMedia(video);
                });

                document.getElementById('mute-btn').addEventListener('click', () => {
                    document.querySelectorAll('video').forEach(v => v.muted = !v.muted);
                });

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        const v = e.target.querySelector('video');
                        if (e.isIntersecting) v.play(); else v.pause();
                    });
                }, { threshold: 0.7 });
                document.querySelectorAll('.snap-item').forEach(i => observer.observe(i));
            } catch (err) { alert("ফাইল লোড হচ্ছে না। 'Live Server' ব্যবহার করছেন তো?"); }
        }
        loadData();
    </script>
</body>
</html>
