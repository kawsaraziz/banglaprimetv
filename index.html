<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { width: 100px; }
        .search-box input { background: #222; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 15px; width: 150px; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #111; overflow-y: auto; padding: 10px; border-right: 1px solid #333; }
        
        .player-wrapper { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; }

        .watermark { position: absolute; top: 10%; left: 10%; color: rgba(255, 255, 255, 0.3); font-size: 20px; animation: move 10s linear infinite alternate; pointer-events: none; z-index: 10; }
        .ticker-box { margin-top: 10px; background: #1a1a1a; padding: 8px; border-radius: 20px; overflow: hidden; white-space: nowrap; border: 1px solid #444; }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; }

        .mobile-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; overflow-y: auto; flex: 1; padding: 5px; }

        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        @keyframes move { from { top: 10%; left: 10%; } to { top: 70%; left: 60%; } }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-grid { display: grid; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://pasteboard.co/ZtT6hBUnLeUU.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/150x50?text=LOGO'">
    <div class="search-box"><input type="text" id="search" placeholder="Search..." onkeyup="filterChannels()"></div>
</header>

<div class="main-wrapper">
    <div class="sidebar" id="sidebar"></div>
    <div class="player-wrapper">
        <div class="player-container">
            <video id="video-player" controls autoplay playsinline></video>
            <div class="watermark">Bangla Prime TV By Kawsar</div>
        </div>
        <div class="ticker-box">
            <div class="ticker-text">স্বাগতম! বর্তমানে নাহাল (Nakhal) এর তাপমাত্রা ৪২°C। আমাদের সাথেই থাকুন।</div>
        </div>
        <div class="mobile-grid" id="mobile-grid"></div>
    </div>
</div>

<script>
    // Wake Lock API: মোবাইল স্ক্রিন অন রাখার জন্য
    async function keepScreenOn() {
        try {
            const wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => {
                console.log('Screen Wake Lock released');
            });
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    // প্রথম ইউজার ইন্টারঅ্যাকশনে সক্রিয় হবে
    document.addEventListener('click', () => {
        keepScreenOn();
    }, { once: true });

    let channelData = [];
    fetch('channels.json')
    .then(r => r.json())
    .then(data => {
        channelData = data;
        renderChannels(data);
    });

    function renderChannels(data) {
        const sidebar = document.getElementById('sidebar');
        const grid = document.getElementById('mobile-grid');
        sidebar.innerHTML = ''; grid.innerHTML = '';
        
        data.forEach(c => {
            const itemHTML = `<div onclick="play('${c.url}')" style="cursor:pointer; padding:10px; border-bottom:1px solid #333; display:flex; align-items:center;">
                <img src="${c.logo}" width="30" style="margin-right:8px;"> ${c.name}</div>`;
            sidebar.innerHTML += itemHTML;
            grid.innerHTML += `<div onclick="play('${c.url}')" style="text-align:center; background:#1a1a1a; padding:8px; border-radius:5px;">
                <img src="${c.logo}" width="35"><div style="font-size:11px; margin-top:5px;">${c.name}</div></div>`;
        });
    }

    function filterChannels() {
        const query = document.getElementById('search').value.toLowerCase();
        renderChannels(channelData.filter(c => c.name.toLowerCase().includes(query)));
    }

    function play(url) {
        const video = document.getElementById('video-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.play();
        }
    }
</script>
</body>
</html>
