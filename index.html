<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #050505; color: #ccc; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* হেডার */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; }
        #search { padding: 6px 12px; background: #111; border: 1px solid #333; border-radius: 20px; color: #fff; font-size: 12px; width: 120px; outline: none; }

        /* ভিডিও */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }

        /* গ্র্যাডিয়েন্ট এনিমেশন টিকার */
        .ticker-wrapper { padding: 3px; background: linear-gradient(90deg, #ff0000, #00a8e1, #ff0000); background-size: 400% 400%; animation: gradientMove 5s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .ticker-bg { background: #000; padding: 5px; }
        .ticker { font-size: 15px; font-weight: bold; color: #fff; white-space: nowrap; }

        /* গ্রিড */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; flex-grow: 1; }
        .card { background: #111; padding: 12px; text-align: center; border-radius: 10px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #00a8e1; }

        footer { text-align: center; padding: 10px; font-size: 11px; color: #555; background: #050505; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/Rakib49/Rakibiptv/main/images%20(11).jpeg" class="logo-img">
    <input type="text" id="search" placeholder="সার্চ করুন..." onkeyup="search()">
</div>

<div class="player-container">
    <video id="videoPlayer" controls autoplay playsinline muted></video>
</div>

<div class="ticker-wrapper">
    <div class="ticker-bg">
        <marquee class="ticker" scrollamount="6">
            ব্রেকিং নিউজ: বাংলা প্রাইম টিভিতে স্বাগতম! | অ্যারো কি ব্যবহার করে চ্যানেল পরিবর্তন করুন | কপিরাইট © আজিজুল হক কাওসার
        </marquee>
    </div>
</div>

<div class="grid" id="grid"></div>

<footer>কপিরাইট © আজিজুল হক কাওসার</footer>

<script>
    let channels = [];
    fetch('channels.json').then(r => r.json()).then(d => {
        channels = d;
        renderChannels(d);
    });

    function renderChannels(data) {
        document.getElementById('grid').innerHTML = data.map(c => `
            <div class="card" onclick="play('${c.url}')">
                <img src="${c.logo}" width="50" style="border-radius:50%">
                <div style="font-size:12px; margin-top:8px;">${c.name}</div>
            </div>`).join('');
    }

    function play(url) {
        const v = document.getElementById('videoPlayer');
        v.muted = false;
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(v);
        v.play();
    }
    
    function search() {
        let val = document.getElementById('search').value.toLowerCase();
        renderChannels(channels.filter(c => c.name.toLowerCase().includes(val)));
    }
</script>
</body>
</html>
