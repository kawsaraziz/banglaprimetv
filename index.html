<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        
        /* হেডার: লোগো বামে, সার্চ ডানে */
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; background: #0f171e; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00a8e1; }
        
        /* ভিডিও ও ওয়াটারমার্ক */
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; }
        #videoPlayer { width: 100%; height: 100%; }
        .watermark { position: absolute; top: 10%; left: 10%; font-size: 2vw; opacity: 0.4; pointer-events: none; z-index: 100; animation: moveWatermark 20s linear infinite; }
        @keyframes moveWatermark { 0% { top: 10%; left: 10%; } 50% { top: 80%; left: 80%; } 100% { top: 10%; left: 10%; } }
        
        /* টিভি স্টাইল বিজ্ঞপ্তি */
        .news-ticker { background: #d00; color: #fff; padding: 8px; font-weight: bold; overflow: hidden; white-space: nowrap; border-top: 2px solid #fff; }
        
        /* সাইড মেনু */
        .trigger-area { position: fixed; left: 0; top: 0; width: 40px; height: 100%; z-index: 9999; }
        .drawer { height: 100%; width: 0; position: fixed; z-index: 10000; top: 0; left: 0; background-color: #0f171e; transition: 0.4s; overflow-y: auto; }
        .trigger-area:hover + .drawer, .drawer:hover { width: 300px; }
        .drawer-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .active-channel { background: #00a8e1 !important; color: #000; }
        
        /* চ্যানেল গ্রিড */
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; height: 35vh; }
        .channel-card { background: #1a242f; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; }
        
        /* ফুটার */
        footer { text-align: center; padding: 10px; font-size: 12px; color: #888; background: #000; }
    </style>
</head>
<body>

<div class="header-container">
    <img src="https://raw.githubusercontent.com/Rakib49/Rakibiptv/main/images%20(11).jpeg" class="logo">
    <input type="text" id="searchBox" placeholder="🔍 সার্চ..." onkeyup="searchChannel()" style="padding: 6px; width: 150px; background: #1a242f; border:none; color:#fff; border-radius:5px;">
</div>

<div class="player-wrapper">
    <div class="watermark">Bangla Prime TV</div>
    <video id="videoPlayer" controls autoplay playsinline muted></video>
</div>

<div class="news-ticker">
    <marquee>ব্রেকিং নিউজ: বাংলা প্রাইম টিভিতে স্বাগতম! | অ্যারো কি ব্যবহার করে চ্যানেল পরিবর্তন করুন | কপিরাইট © আজিজুল হক কাওসার।</marquee>
</div>

<div id="categoryBar" style="display:flex; overflow-x:auto; padding:10px; gap:10px; background:#1a242f;"></div>

<div class="trigger-area"></div>
<div class="drawer" id="drawer">
    <div style="padding: 15px; color: #00a8e1; font-weight: bold;">চ্যানেল তালিকা</div>
    <div id="drawerContent"></div>
</div>

<div class="channel-list" id="channelGrid"></div>

<footer>কপিরাইট © আজিজুল হক কাওসার</footer>

<script>
    let allChannels = [], currentIndex = 0;

    fetch('channels.json').then(res => res.json()).then(data => {
        allChannels = data;
        renderUI(data);
        renderCats(data);
    });

    function renderCats(data) {
        const bar = document.getElementById('categoryBar');
        const cats = ['All', ...new Set(data.map(c => c.category))];
        bar.innerHTML = cats.map(c => `<button onclick="filter('${c}')" style="background:#00a8e1; border:none; padding:5px 15px; border-radius:15px; cursor:pointer;">${c}</button>`).join('');
    }

    function filter(cat) {
        renderUI(cat === 'All' ? allChannels : allChannels.filter(c => c.category === cat));
    }

    function renderUI(data) {
        const grid = document.getElementById('channelGrid');
        const drawer = document.getElementById('drawerContent');
        grid.innerHTML = data.map((ch, i) => `<div class="channel-card" onclick="play('${ch.url}', ${i})"><img src="${ch.logo}" width="40"><div style="font-size:10px">${ch.name}</div></div>`).join('');
        drawer.innerHTML = data.map((ch, i) => `<div class="drawer-item" id="ch-${i}" onclick="play('${ch.url}', ${i})"><img src="${ch.logo}" width="30" style="margin-right:10px">${ch.name}</div>`).join('');
    }

    function play(url, i) {
        currentIndex = i;
        const v = document.getElementById('videoPlayer');
        v.muted = false;
        const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v); v.play();
        document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active-channel'));
        document.getElementById(`ch-${i}`).classList.add('active-channel');
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowRight') play(allChannels[(currentIndex + 1) % allChannels.length].url, (currentIndex + 1) % allChannels.length);
        if(e.key === 'ArrowLeft') play(allChannels[(currentIndex - 1 + allChannels.length) % allChannels.length].url, (currentIndex - 1 + allChannels.length) % allChannels.length);
    });
</script>
</body>
</html>
