<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; }
        .active-pill { background: #ff0000 !important; }
    </style>
</head>
<body class="pb-24">

    <!-- হেডার -->
    <header class="p-4 flex items-center justify-between sticky top-0 bg-black z-50">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-xl" onclick="alert('Menu Opened')"></i>
            <h1 class="text-red-600 font-bold text-2xl tracking-tighter">NAHIDFLIX</h1>
        </div>
        <div class="bg-gray-900 px-4 py-2 rounded-full flex items-center gap-2">
            <i class="fas fa-search text-gray-400"></i>
            <input type="text" id="searchInput" onkeyup="searchChannels()" placeholder="Search channels..." class="bg-transparent outline-none text-sm w-32">
        </div>
    </header>

    <!-- ক্যাটাগরি বার -->
    <div id="catBar" class="flex gap-2 px-4 py-2 overflow-x-auto">
        <button onclick="filterChannels('All')" class="bg-gray-800 px-6 py-2 rounded-full text-sm font-bold active-pill">All</button>
    </div>

    <!-- চ্যানেল গ্রিড -->
    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4"></div>

    <script>
        let allChannels = [];

        // JSON লোড করা
        async function fetchChannels() {
            try {
                const response = await fetch('channels.json');
                allChannels = await response.json();
                renderChannels(allChannels);
                renderCategories();
            } catch (error) {
                console.error("JSON ফাইল লোড হয়নি:", error);
            }
        }

        // চ্যানেল রেন্ডার করা
        function renderChannels(data) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = data.map(ch => `
                <div class="bg-gray-900 p-4 rounded-xl text-center" onclick="console.log('Playing ${ch.name}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-xs font-bold truncate">${ch.name}</p>
                </div>
            `).join('');
        }

        // ক্যাটাগরি তৈরি
        function renderCategories() {
            const cats = ['All', ...new Set(allChannels.map(c => c.category))];
            const catBar = document.getElementById('catBar');
            catBar.innerHTML = cats.map(c => `
                <button onclick="filterChannels('${c}')" class="bg-gray-800 px-6 py-2 rounded-full text-sm font-bold">${c}</button>
            `).join('');
        }

        // ফিল্টার এবং সার্চ
        function filterChannels(cat) {
            const filtered = (cat === 'All') ? allChannels : allChannels.filter(c => c.category === cat);
            renderChannels(filtered);
        }

        function searchChannels() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(val)));
        }

        fetchChannels();
    </script>
</body>
</html>
