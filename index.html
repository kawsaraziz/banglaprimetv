<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .red-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); border: 1px solid #dc2626; }
        .player-wrapper { position: sticky; top: 0; z-index: 100; background: #000; }
        .cat-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 15px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .channel-card { min-width: 130px; padding: 10px; text-align: center; border: 1px solid #333; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .channel-card:hover { border-color: #dc2626; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center glass">
        <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
        <i class="fas fa-search text-lg"></i>
    </header>

    <div class="player-wrapper aspect-video w-full border-b-2 border-red-600">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="cat-scroll" id="catBar">
        <button onclick="renderAll()" class="px-5 py-2 bg-red-600 rounded-full text-xs">All</button>
    </div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4"></div>

    <footer class="fixed bottom-0 w-full glass p-4 flex justify-around text-lg">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="toggleSideMenu()"><i class="fas fa-bars"></i></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <div id="sideMenu" class="hidden fixed inset-0 bg-black/90 z-[200] p-10">
        <button onclick="toggleSideMenu()" class="text-3xl"><i class="fas fa-times"></i></button>
        <div id="menuCats" class="mt-10 space-y-6 text-xl"></div>
    </div>

    <script>
        let channels = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];

        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); renderMenu(); });

        function renderAll(data = channels) {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="channel-card glass red-glow" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-12 h-12 mx-auto rounded-full mb-2">
                    <p class="text-xs truncate">${ch.name}</p>
                    <i class="fas fa-heart mt-2 ${favs.includes(ch.id) ? 'text-red-600' : 'text-gray-500'}" onclick="toggleFav(${ch.id}, event)"></i>
                </div>
            `).join('');
        }

        function toggleSideMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }
        function play(url) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }
        function toggleFav(id, e) { e.stopPropagation(); favs.includes(id) ? favs = favs.filter(f => f !== id) : favs.push(id); localStorage.setItem('favs', JSON.stringify(favs)); renderAll(); }
        function renderMenu() {
            const cats = [...new Set(channels.map(c => c.category))];
            document.getElementById('menuCats').innerHTML = cats.map(c => `<div onclick="filter('${c}'); toggleSideMenu()">${c}</div>`).join('');
            document.getElementById('catBar').innerHTML += cats.map(c => `<button onclick="filter('${c}')" class="px-4 py-2 bg-[#1a1a1a] rounded-full text-xs whitespace-nowrap">${c}</button>`).join('');
        }
        function filter(cat) { renderAll(channels.filter(c => c.category === cat)); }
        function showFavs() { renderAll(channels.filter(c => favs.includes(c.id))); }
    </script>
</body>
</html>
