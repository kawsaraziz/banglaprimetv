<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        /* ট্রান্সপারেন্ট গ্লাস লুক */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .player-container { width: 100%; max-width: 800px; margin: auto; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        
        .card { border: 2px solid #ff0000; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        
        .cat-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="glass p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
        <input type="text" id="searchBox" onkeyup="searchCh()" placeholder="Search..." class="bg-black/50 p-2 rounded-lg text-sm border border-gray-800">
    </header>

    <div class="player-container mt-4">
        <div class="aspect-video bg-black border-4 border-red-600">
            <iframe id="mainPlayer" src="" class="w-full h-full" allowfullscreen></iframe>
        </div>
    </div>

    <div class="cat-scroll glass mt-4 mx-4 rounded-xl" id="catBar">
        <button onclick="renderAll()" class="px-4 py-2 bg-red-600 rounded-lg text-sm">All</button>
    </div>

    <div id="channelGrid" class="grid-layout mt-4"></div>

    <footer class="glass fixed bottom-0 w-full flex justify-around p-4 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="document.getElementById('sideMenu').style.display='block'"><i class="fas fa-bars"></i></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <script>
        let channels = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];

        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); renderCats(); });

        function renderAll(data = channels) {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="card glass" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto mb-2">
                    <p class="text-xs">${ch.name}</p>
                    <i class="fas fa-heart absolute bottom-2 right-2 ${favs.includes(ch.id) ? 'text-red-500' : 'text-gray-500'}" onclick="toggleFav(${ch.id}, event)"></i>
                </div>
            `).join('');
        }

        function renderCats() {
            const cats = [...new Set(channels.map(c => c.category))];
            document.getElementById('catBar').innerHTML += cats.map(c => `<button onclick="filter('${c}')" class="px-4 py-2 bg-gray-800 rounded-lg text-sm whitespace-nowrap">${c}</button>`).join('');
        }

        function play(url) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }
        function filter(cat) { renderAll(channels.filter(c => c.category === cat)); }
        function toggleFav(id, e) { e.stopPropagation(); favs.includes(id) ? favs = favs.filter(f => f !== id) : favs.push(id); localStorage.setItem('favs', JSON.stringify(favs)); renderAll(); }
    </script>
</body>
</html>
