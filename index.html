<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        
        /* স্টিকি প্লেয়ার ও ক্যাটাগরি */
        .sticky-top { position: sticky; top: 0; z-index: 100; background: #000; }
        .cat-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; scrollbar-width: none; background: #000; position: sticky; top: 56.25vw; z-index: 99; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        
        /* গ্লোসি রেড ভাইব */
        .channel-card { min-width: 130px; padding: 15px; text-align: center; background: rgba(255, 0, 0, 0.1); border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
        .channel-card:hover { background: rgba(255, 0, 0, 0.2); }
        
        .active-cat { background: #ff0000 !important; color: white; }
        .signature { font-family: cursive; color: #ff0000; font-size: 10px; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky-top p-4 glass border-b border-red-900/30">
        <div class="flex justify-between items-center">
            <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
            <p class="signature">Powered By Kawsar Aziz</p>
        </div>
    </header>

    <div class="aspect-video w-full">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="cat-scroll" id="catBar"></div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4 mt-2"></div>

    <footer class="fixed bottom-0 w-full glass p-4 flex justify-around items-center z-50">
        <button onclick="location.reload()"><i class="fas fa-home text-xl"></i></button>
        <div class="relative w-2/3">
            <input type="text" id="footerSearch" onkeyup="searchCh()" placeholder="Search..." class="w-full bg-black/50 py-2 px-4 rounded-full text-sm border border-red-900/50 outline-none">
        </div>
        <button onclick="toggleSideMenu()"><i class="fas fa-bars text-xl"></i></button>
    </footer>

    <script>
        let channels = [];
        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); renderMenu(); });

        function renderAll(data = channels, activeCat = 'All') {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="channel-card" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto rounded-full mb-3">
                    <p class="text-xs font-bold truncate">${ch.name}</p>
                </div>
            `).join('');
            
            // ক্যাটাগরি বাটন হাইলাইট
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active-cat', btn.innerText === activeCat);
            });
        }

        function play(url) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }
        
        function renderMenu() {
            const cats = ['All', ...new Set(channels.map(c => c.category))];
            document.getElementById('catBar').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="cat-btn px-5 py-2 bg-gray-900 rounded-full text-xs whitespace-nowrap shrink-0">${c}</button>`
            ).join('');
        }

        function filter(cat) {
            const filtered = (cat === 'All') ? channels : channels.filter(c => c.category === cat);
            renderAll(filtered, cat);
        }

        function searchCh() {
            const val = document.getElementById('footerSearch').value.toLowerCase();
            renderAll(channels.filter(c => c.name.toLowerCase().includes(val)));
        }
    </script>
</body>
</html>
