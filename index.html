<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        /* ডেস্কটপ সাইডবার */
        .sidebar { width: 300px; background: #111; overflow-y: auto; padding: 10px; border-right: 1px solid #333; }
        
        /* প্লেয়ার বক্স */
        .player-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; }
        video { width: 100%; height: 100%; }

        /* মোবাইল চ্যানেল লিস্ট - স্ক্রলিং ফিক্স */
        .mobile-grid { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-top: 15px; 
            overflow-y: auto; /* শুধু এখানে স্ক্রোল হবে */
            flex: 1; /* বাকি জায়গা দখল করবে */
        }

        @media (max-width: 768px) {
            body { overflow: hidden; } /* পেজ স্ক্রোল বন্ধ */
            .main-wrapper { flex-direction: column; }
            .sidebar { display: none; }
            .player-container { height: auto; min-height: 200px; } /* মোবাইলে প্লেয়ার ছোট */
            .mobile-grid { display: grid; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150x50?text=LOGO" class="logo-img">
    <input type="text" id="search" placeholder="Search..." onkeyup="filterChannels()">
</header>

<div class="main-wrapper">
    <div class="sidebar" id="sidebar"></div>
    <div class="player-wrapper">
        <div class="player-container">
            <video id="video-player" controls autoplay playsinline></video>
        </div>
        <div class="mobile-grid" id="mobile-grid"></div>
    </div>
</div>

<script>
    // আপনার আগের লজিক এখানে থাকবে...
    function play(url) {
        const video = document.getElementById('video-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.play();
        }
    }
</script>
</body>
</html>
