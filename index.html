<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <header>
        <div style="font-size: 26px; font-weight: bold;">Bangla Prime</div>
        <input type="text" id="search" class="search-box" placeholder="🔍 চ্যানেল সার্চ করুন...">
    </header>

    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" style="color:#1877f2"><i class="fas fa-home"></i></a>
        <a href="video.html" style="color:#65676b"><i class="fas fa-video"></i></a>
    </nav>

    <script>
        fetch('channels.json').then(r => r.json()).then(data => {
            const feed = document.getElementById('feed');
            function render(filter = "") {
                feed.innerHTML = "";
                data.filter(item => item.name.toLowerCase().includes(filter.toLowerCase())).forEach((ch, i) => {
                    if(ch.type === 'video') {
                        feed.innerHTML += `
                            <div class="card">
                                <div class="header-info"><div class="profile-img"></div><b>${ch.name}</b></div>
                                <video id="v-${i}" controls playsinline></video>
                                <div class="actions"><i class="fas fa-thumbs-up"></i> লাইক <i class="fas fa-comment"></i> কমেন্ট <i class="fas fa-share"></i> শেয়ার</div>
                            </div>`;
                        setTimeout(() => { const v = document.getElementById(`v-${i}`); const hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(v); }, 500);
                    } else {
                        feed.innerHTML += `<div class="card"><div class="header-info"><div class="profile-img"></div><b>${ch.name}</b></div><p style="padding:10px;">${ch.text}</p></div>`;
                    }
                });
            }
            render();
            document.getElementById('search').oninput = (e) => render(e.target.value);
        });
    </script>
</body>
</html>
