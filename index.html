<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Nahidflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #050505; padding: 16px 0; }
        .channel-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 0, 0, 0.1); box-shadow: 0 0 15px 2px rgba(255, 0, 0, 0.2); border-radius: 15px; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky-header px-4 border-b border-red-900/20">
        <header class="flex items-center justify-between">
            <i class="fas fa-bars text-xl" onclick="toggleMenu()"></i>
            <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
            <i class="fas fa-search" onclick="focusSearch()"></i>
        </header>
    </div>

    <div class="px-4 py-4">
        <div class="aspect-video w-full bg-black rounded-xl overflow-hidden border border-red-900/30">
            <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div id="catBar" class="flex gap-2 px-4 pb-4 overflow-x-auto"></div>

    <input type="text" id="mainSearch" onkeyup="searchChannels()" placeholder="Search..." 
           class="hidden mx-4 w-[90%] p-3 mb-4 bg-gray-900 text-sm outline-none border border-red-900/30 rounded-lg">

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4"></div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-red-900/20 p-4 flex justify-around text-gray-400 z-50">
        <div class="flex flex-col items-center"><i class="fas fa-home text-lg text-red-600"></i><span class="text-[10px]">Home</span></div>
        <div class="flex flex-col items-center" onclick="focusSearch()"><i class="fas fa-search text-lg"></i><span class="text-[10px]">Search</span></div>
        <div class="flex flex-col items-center" onclick="toggleMenu()"><i class="fas fa-bars text-lg"></i><span class="text-[10px]">Menu</span></div>
    </nav>

    <div id="sideMenu" class="menu-overlay">
        <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        <div class="mt-10 space-y-6 text-2xl text-center">
            <p onclick="filter('All'); toggleMenu()">সব চ্যানেল</p>
        </div>
    </div>

    <script>
        let allChannels = [];
        async function init() {
            try {
                const res = await fetch('channels.json');
                allChannels = await res.json();
                render(allChannels);
                renderCats();
            } catch(e) { console.error("JSON লোড হয়নি"); }
        }

        function render(data) {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="channel-card p-4 text-center" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-xs font-bold truncate">${ch.name}</p>
                </div>
            `).join('');
        }

        function renderCats() {
            const cats = ['All', ...new Set(allChannels.map(c => c.category))];
            document.getElementById('catBar').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="bg-gray-800 px-5 py-1 rounded-full text-xs whitespace-nowrap">${c}</button>`
            ).join('');
        }

        function play(url) { document.getElementById('mainPlayer').src = url + '?autoplay=1'; }
        function focusSearch() { const s = document.getElementById('mainSearch'); s.classList.toggle('hidden'); s.focus(); }
        function toggleMenu() { const m = document.getElementById('sideMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function filter(c) { render(c === 'All' ? allChannels : allChannels.filter(x => x.category === c)); }
        function searchChannels() { const v = document.getElementById('mainSearch').value.toLowerCase(); render(allChannels.filter(c => c.name.toLowerCase().includes(v))); }

        init();
    </script>
</body>
</html>
