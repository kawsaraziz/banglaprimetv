<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #111; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { width: 100px; }
        .search-box input { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 20px; width: 150px; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #111; overflow-y: auto; padding: 10px; border-right: 1px solid #333; }
        
        .player-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .player-container { width: 100%; flex-grow: 1; background: #000; position: relative; min-height: 400px; }
        video { width: 100%; height: 100%; }

        /* নিউজ টিকার স্টাইল */
        .ticker-box { margin-top: 10px; border: 1px solid #444; border-radius: 20px; padding: 8px 20px; background: #1a1a1a; overflow: hidden; height: 40px; display: flex; align-items: center; }
        .ticker-text { white-space: nowrap; display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .mobile-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .main-wrapper { flex-direction: column; overflow: visible; }
            .sidebar { display: none; }
            .mobile-grid { display: grid; padding-bottom: 20px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150x50?text=LOGO" alt="Logo" class="logo-img">
    <div class="search-box"><input type="text" id="search" placeholder="Search..." onkeyup="filterChannels()"></div>
</header>

<div class="main-wrapper">
    <div class="sidebar" id="sidebar"></div>
    <div class="player-wrapper">
        <div class="player-container">
            <video id="video-player" controls autoplay playsinline></video>
        </div>
        <div class="ticker-box">
            <div class="ticker-text" id="ticker">স্বাগতম! নাহাল এর তাপমাত্রা ৪২°C। আমাদের সাথেই থাকুন।</div>
        </div>
        <div class="mobile-grid" id="mobile-grid"></div>
    </div>
</div>

<script>
    let channelData = [];

    fetch('channels.json')
    .then(r => r.json())
    .then(data => {
        channelData = data;
        renderChannels(data);
    });

    function renderChannels(data) {
        const sidebar = document.getElementById('sidebar');
        const grid = document.getElementById('mobile-grid');
        sidebar.innerHTML = ''; grid.innerHTML = '';
        
        data.forEach(c => {
            // সাইডবার লোগো ফিক্স
            sidebar.innerHTML += `<div onclick="play('${c.url}')" style="cursor:pointer; padding:10px; display:flex; align-items:center;">
                <img src="${c.logo}" width="30" style="margin-right:10px;"> ${c.name}</div>`;
            // মোবাইল গ্রিড লোগো ফিক্স
            grid.innerHTML += `<div onclick="play('${c.url}')" style="text-align:center; background:#1a1a1a; padding:10px; border-radius:5px;">
                <img src="${c.logo}" width="40"><div style="font-size:12px; margin-top:5px;">${c.name}</div></div>`;
        });
    }

    function play(url) {
        const video = document.getElementById('video-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.play(); // ম্যানুয়াল প্লে কমান্ড
        }
    }
</script>
</body>
</html>
