<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .sticky-section { position: sticky; top: 0; z-index: 50; background: #050505; padding-top: 10px; }
        .channel-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 0, 0, 0.2); box-shadow: 0 0 15px 2px rgba(255, 0, 0, 0.2); border-radius: 16px; transition: 0.3s; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky-section">
        <header class="px-4 flex items-center justify-between mb-4">
            <i class="fas fa-bars text-xl" onclick="toggleMenu()"></i>
            <a href="#"><img src="logo.png" alt="Nahidflix" class="h-10 w-auto"></a>
            <i class="fas fa-search" onclick="document.getElementById('mainSearch').classList.toggle('hidden')"></i>
        </header>

        <div class="px-4">
            <video id="mainPlayer" class="w-full aspect-video bg-black rounded-xl border border-red-900/30" controls autoplay playsinline></video>
        </div>

        <input type="text" id="mainSearch" onkeyup="searchChannels()" placeholder="Search channels..." class="hidden mx-4 w-[90%] mt-4 p-2 bg-gray-900 rounded-lg text-sm border border-red-900/30">
    </div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4"></div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-red-900/20 p-4 flex justify-around text-gray-400 z-50">
        <div class="flex flex-col items-center text-red-600"><i class="fas fa-home text-lg"></i><span class="text-[10px]">Home</span></div>
        <div class="flex flex-col items-center" onclick="document.getElementById('mainSearch').classList.toggle('hidden')"><i class="fas fa-search text-lg"></i><span class="text-[10px]">Search</span></div>
        <div class="flex flex-col items-center" onclick="toggleMenu()"><i class="fas fa-bars text-lg"></i><span class="text-[10px]">Menu</span></div>
    </nav>

    <div id="sideMenu" class="menu-overlay">
        <i class="fas fa-times text-2xl p-4" onclick="toggleMenu()"></i>
        <div class="p-4">
            <h2 class="text-red-500 font-bold text-center mb-4 border-b border-gray-800 pb-2">ক্যাটাগরি</h2>
            <div id="menuCategories" class="space-y-2 text-sm text-center mb-8"></div>
            <h2 class="text-red-500 font-bold text-center mb-4 border-b border-gray-800 pb-2">সব চ্যানেল</h2>
            <div id="menuChannels" class="grid grid-cols-2 gap-2 text-xs text-center"></div>
        </div>
    </div>

    <script>
        let allChannels = [];
        const video = document.getElementById('mainPlayer');
        let hls = new Hls();

        async function init() {
            const res = await fetch('channels.json');
            allChannels = await res.json();
            render(allChannels);
            
            const cats = ['All', ...new Set(allChannels.map(c => c.category))];
            document.getElementById('menuCategories').innerHTML = cats.map(c => 
                `<p class="cursor-pointer py-1 hover:text-red-500" onclick="filter('${c}'); toggleMenu()">${c}</p>`
            ).join('');

            document.getElementById('menuChannels').innerHTML = allChannels.map(ch => `
                <div class="p-2 bg-gray-900 rounded-lg cursor-pointer" onclick="play('${ch.url}'); toggleMenu()">
                    <img src="${ch.logo}" class="w-8 h-8 mx-auto rounded-full mb-1">
                    <p class="truncate">${ch.name}</p>
                </div>
            `).join('');
        }

        function filter(c) { render(c === 'All' ? allChannels : allChannels.filter(x => x.category === c)); }

        function render(data) {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="channel-card p-4 text-center cursor-pointer" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-xs font-bold truncate">${ch.name}</p>
                </div>
            `).join('');
        }

        function play(url) {
            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            } else { video.src = url; video.play(); }
        }

        function toggleMenu() { const m = document.getElementById('sideMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function searchChannels() { const v = document.getElementById('mainSearch').value.toLowerCase(); render(allChannels.filter(c => c.name.toLowerCase().includes(v))); }

        init();
    </script>
</body>
</html>
