<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #333; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        .main-section { flex: 3; padding: 10px; display: flex; flex-direction: column; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; position: relative; }
        #videoPlayer { width: 100%; height: 100%; }

        /* চ্যানেল লিস্ট গ্রিড সিস্টেম */
        .sidebar { flex: 1; padding: 10px; overflow-y: auto; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .channel-item { aspect-ratio: 1/1; background: #111; border: 1px solid #333; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; padding: 5px; }
        .channel-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .main-section { height: 250px; flex: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>📺 বাংলা প্রাইম</div>
        <input type="text" placeholder="সার্চ...">
    </div>

    <div class="wrapper">
        <div class="main-section">
            <div class="video-box">
                <video id="videoPlayer" controls autoplay></video>
            </div>
        </div>
        <div class="sidebar">
            <div class="channel-grid" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const list = document.getElementById('channelList');

        // আপনার JSON এর ডাটা এখানে সরাসরি বসিয়ে দিন
        const channels = [
            { "name": "চ্যানেল ১", "logo": "https://via.placeholder.com/50", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { "name": "চ্যানেল ২", "logo": "https://via.placeholder.com/50", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { "name": "চ্যানেল ৩", "logo": "https://via.placeholder.com/50", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        function renderChannels() {
            list.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => playVideo(ch.url);
                list.appendChild(div);
            });
        }

        function playVideo(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            } else { video.src = url; }
        }

        renderChannels();
    </script>
</body>
</html>
