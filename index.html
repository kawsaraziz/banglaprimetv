<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        .light-mode { --bg: #f0f0f0; --text: #000; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.5s; }
        
        /* হেডার ও সার্চ */
        .header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
        .search-box { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; width: 250px; }
        
        .wrapper { display: flex; height: calc(100vh - 70px); }

        /* প্লেয়ার সেকশন */
        .player-container { flex: 4; padding: 20px; position: relative; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; }
        .watermark { position: absolute; top: 15px; right: 25px; color: red; font-weight: bold; animation: blink 2s infinite; z-index: 10; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        #poster-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }

        /* সাইডবার ও গ্রিড */
        .channel-sidebar { flex: 1; min-width: 300px; overflow-y: auto; padding: 20px; border-left: 1px solid #333; }
        .scrolling-container { border: 1px solid #555; border-radius: 20px; padding: 5px 15px; margin-bottom: 15px; }
        .channel-list { display: flex; flex-direction: column; gap: 10px; }
        .channel-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: #111; border-radius: 8px; cursor: pointer; border: 1px solid #333; }
        .channel-logo { width: 45px; height: 45px; background: #444; border-radius: 50%; }

        /* পোর্ট্রেট মোড */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            .channel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .channel-item { flex-direction: column; text-align: center; }
            .channel-logo { width: 60px; height: 60px; }
            #startup-poster { position: fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#000; display: flex; justify-content: center; align-items: center; }
        }
    </style>
</head>
<body>

    <div id="startup-poster"><img src="STARTUP_LINK_HERE" alt="Loading..."></div>

    <div class="header">
        <div>📺 <b>MEDIA</b></div>
        <input type="text" class="search-box" placeholder="সার্চ...">
    </div>

    <div class="wrapper">
        <div class="player-container">
            <div class="video-box">
                <div class="watermark">LIVE</div>
                <img id="poster-img" src="POSTER_LINK_HERE" alt="Poster">
                <video id="videoPlayer" autoplay></video>
            </div>
        </div>

        <div class="channel-sidebar">
            <div class="scrolling-container"><marquee>স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
            <div class="channel-list">
                <div class="channel-item" onclick="playChannel('LINK1')"><div class="channel-logo"></div><span>চ্যানেল ১</span></div>
                <div class="channel-item" onclick="playChannel('LINK2')"><div class="channel-logo"></div><span>চ্যানেল ২</span></div>
            </div>
        </div>
    </div>

    <script>
        // ডে-নাইট মোড
        const hour = new Date().getHours();
        if (hour < 6 || hour > 18) document.body.classList.remove('light-mode');
        else document.body.classList.add('light-mode');

        // স্টার্টআপ পোস্টার ৩ সেকেন্ড
        setTimeout(() => { document.getElementById('startup-poster').style.display = 'none'; }, 3000);

        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');

        function playChannel(url) {
            poster.style.display = 'none';
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            }
        }

        window.onload = () => playChannel('LINK1'); // প্রথম চ্যানেল অটো প্লে
        video.onpause = () => poster.style.display = 'block';
    </script>
</body>
</html>
