<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }

        header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { width: 100px; }
        .search-box input { background: #222; border: none; color: #fff; padding: 5px 10px; border-radius: 15px; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #111; overflow-y: auto; padding: 10px; }
        
        .player-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        /* প্লেয়ারের সাইজ নির্ধারণ */
        .player-container { width: 100%; height: 450px; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .watermark { position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.4); pointer-events: none; animation: move 10s linear infinite alternate; font-size: 20px; }

        .ticker-box { margin-top: 15px; border: 1px solid #444; border-radius: 20px; padding: 8px 20px; background: #1a1a1a; overflow: hidden; white-space: nowrap; height: 40px; display: flex; align-items: center; }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; }
        
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        @keyframes move { from { top: 20px; left: 20px; } to { top: 80%; left: 60%; } }

        /* মোবাইল গ্রিড স্টাইল */
        .mobile-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { display: none; }
            .player-container { height: 250px; } /* মোবাইলে প্লেয়ার ছোট করা হয়েছে */
            .mobile-grid { display: grid; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150x50?text=LOGO" alt="Logo" class="logo-img">
    <div class="search-box"><input type="text" placeholder="Search..."></div>
</header>

<div class="main-wrapper">
    <div class="sidebar" id="sidebar"></div>
    
    <div class="player-wrapper">
        <div class="player-container">
            <video id="video-player" controls></video>
            <div class="watermark">Bangla Prime TV By Kawsar</div>
        </div>
        <div class="ticker-box">
            <div class="ticker-text">স্বাগতম! বর্তমানে নাহাল (Nakhal) এর তাপমাত্রা ৪২°C। আমাদের সাথেই থাকুন।</div>
        </div>
        <div class="mobile-grid" id="mobile-grid"></div>
    </div>
</div>

<script>
    fetch('channels.json')
    .then(r => r.json())
    .then(data => {
        const sidebar = document.getElementById('sidebar');
        const grid = document.getElementById('mobile-grid');
        data.forEach(c => {
            const html = `<div onclick="play('${c.url}')" style="cursor:pointer; padding:10px; border-bottom:1px solid #333;">
                <img src="${c.logo}" width="30"> ${c.name}</div>`;
            sidebar.innerHTML += html;
            grid.innerHTML += `<div onclick="play('${c.url}')" style="text-align:center; background:#1a1a1a; padding:10px; border-radius:5px;"><img src="${c.logo}" width="40"><div style="font-size:12px; margin-top:5px;">${c.name}</div></div>`;
        });
    });

    function play(url) {
        const video = document.getElementById('video-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.play();
        }
    }
</script>
</body>
</html>
