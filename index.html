<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix TV Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .scroll-container { display: flex; overflow-x: auto; gap: 16px; padding: 16px; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .card { min-width: 140px; background: #161616; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #333; }
        .player-border { border: 2px solid #333; border-radius: 16px; overflow: hidden; }
        .text-red-primary { color: #e50914; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#0a0a0a]/90 z-50">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-xl"></i>
            <h1 class="text-red-primary font-bold text-2xl">NAHIDFLIX</h1>
        </div>
        <div class="bg-[#161616] px-4 py-2 rounded-full flex items-center gap-2 border border-gray-800">
            <i class="fas fa-search text-gray-400"></i>
            <input type="text" placeholder="Search channels..." class="bg-transparent outline-none text-sm w-32">
        </div>
    </header>

    <section class="px-4">
        <div class="aspect-video bg-black player-border flex items-center justify-center">
            <p class="text-gray-500">Video Player Component</p>
        </div>
    </section>

    <section class="mt-6">
        <h2 class="px-4 font-bold flex items-center gap-2">
            <i class="far fa-clock text-red-primary"></i> Continue Watching
        </h2>
        <div class="scroll-container">
            <div class="card"><div class="h-16 bg-gray-800 rounded-lg mb-2"></div><p class="text-xs">Discovery</p></div>
            <div class="card"><div class="h-16 bg-gray-800 rounded-lg mb-2"></div><p class="text-xs">Ananda TV</p></div>
        </div>
    </section>

    <section id="channel-lists"></section>

    <footer class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around p-4 z-50">
        <div class="text-red-primary text-center"><i class="fas fa-home"></i><p class="text-[10px]">Home</p></div>
        <div class="text-gray-500 text-center"><i class="fas fa-search"></i><p class="text-[10px]">Search</p></div>
        <div class="text-gray-500 text-center"><i class="fas fa-heart"></i><p class="text-[10px]">Favs</p></div>
    </footer>

    <script>
        // এখানে আপনার JSON ডেটা দিয়ে এই ফাংশনটি লুপ করাবেন
        const categories = ["Bangla Channels", "Sports", "News"];
        const listDiv = document.getElementById('channel-lists');

        categories.forEach(cat => {
            listDiv.innerHTML += `
                <div class="mt-6">
                    <h2 class="px-4 font-bold">${cat}</h2>
                    <div class="scroll-container">
                        <div class="card border-red-900"><div class="h-16 bg-red-900/20 rounded-lg mb-2"></div><p class="text-xs">Channel 1</p></div>
                        <div class="card"><div class="h-16 bg-gray-800 rounded-lg mb-2"></div><p class="text-xs">Channel 2</p></div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
