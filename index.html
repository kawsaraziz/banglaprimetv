    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .scroll-hide::-webkit-scrollbar { display: none; }

        .cat-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #1a1a1a; margin-bottom: 5px; }

    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex items-center justify-between">
        <h1 class="text-[#ff0000] font-bold text-2xl">NAHIDFLIX</h1>

            <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
            <input type="text" id="searchBox" onkeyup="searchCh()" placeholder="Search..." class="bg-[#1a1a1a] pl-10 pr-4 py-2 rounded-full text-sm w-40 border border-gray-800 outline-none">
        </div>
    </header>

    <div class="player-fixed w-full aspect-video bg-black border-b-2 border-red-900">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay"></iframe>
    </div>

    <div class="flex gap-4 p-4 overflow-x-auto scroll-hide bg-[#050505]">
        <button onclick="renderAll()" class="flex flex-col items-center"><div class="cat-icon bg-red-600"><i class="fas fa-th"></i></div><span class="text-[10px]">All</span></button>
        <button onclick="filterCat('Bangla')" class="flex flex-col items-center"><div class="cat-icon"><i class="fas fa-language"></i></div><span class="text-[10px]">Bangla</span></button>
        <button onclick="filterCat('Sports')" class="flex flex-col items-center"><div class="cat-icon"><i class="fas fa-futbol"></i></div><span class="text-[10px]">Sports</span></button>
        <button onclick="filterCat('News')" class="flex flex-col items-center"><div class="cat-icon"><i class="fas fa-newspaper"></i></div><span class="text-[10px]">News</span></button>
    </div>

    <div id="mainContent">
        <h2 class="px-4 font-bold text-lg">Continue Watching</h2>
        <div id="continueRow" class="flex gap-4 p-4 overflow-x-auto scroll-hide"></div>
        <div id="channelGrid"></div>
    </div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i><p class="text-[10px]">Home</p></button>
        <button onclick="toggleMenu()"><i class="fas fa-bars"></i><p class="text-[10px]">Menu</p></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i><p class="text-[10px]">Favs</p></button>
    </footer>

</html>
