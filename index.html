<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .active-pill { background: #ff0000 !important; }
        .nav-item { color: #6b7280; }
        .nav-item.active { color: #ffffff; }
        /* কাস্টম স্ক্রলবার হাইড */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex items-center justify-between sticky top-0 bg-black z-50">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-xl"></i>
            <h1 class="text-red-600 font-bold text-2xl tracking-tighter">NAHIDFLIX</h1>
        </div>
        <div class="bg-gray-900 px-3 py-2 rounded-full flex items-center gap-2 w-40">
            <i class="fas fa-search text-gray-400 text-sm"></i>
            <input type="text" placeholder="Search..." class="bg-transparent outline-none text-xs w-full">
        </div>
    </header>

    <div id="catBar" class="flex gap-2 px-4 py-2 overflow-x-auto">
        <button class="active-pill px-5 py-1.5 rounded-full text-xs font-bold">All</button>
        <button class="bg-gray-800 px-5 py-1.5 rounded-full text-xs font-bold">Bangla</button>
        <button class="bg-gray-800 px-5 py-1.5 rounded-full text-xs font-bold">Sports</button>
        <button class="bg-gray-800 px-5 py-1.5 rounded-full text-xs font-bold">News</button>
    </div>

    <div class="px-4 py-2">
        <div class="aspect-video w-full bg-black rounded-xl overflow-hidden border border-gray-800">
            <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4">
        </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-900 p-3 flex justify-around z-50">
        <div class="nav-item active flex flex-col items-center text-[10px]"><i class="fas fa-home text-lg"></i> Home</div>
        <div class="nav-item flex flex-col items-center text-[10px]"><i class="fas fa-search text-lg"></i> Search</div>
        <div class="nav-item flex flex-col items-center text-[10px]"><i class="fas fa-heart text-lg"></i> Favs</div>
        <div class="nav-item flex flex-col items-center text-[10px]"><i class="fas fa-bars text-lg"></i> Menu</div>
    </nav>

    <script>
        // JSON লোড করার লজিক
        async function loadData() {
            try {
                const res = await fetch('channels.json');
                const channels = await res.json();
                const grid = document.getElementById('channelGrid');
                grid.innerHTML = channels.map(ch => `
                    <div class="bg-gray-900 p-3 rounded-xl border border-gray-800" onclick="document.getElementById('mainPlayer').src='${ch.url}?autoplay=1'">
                        <img src="${ch.logo}" class="w-12 h-12 mx-auto rounded-full mb-2">
                        <p class="text-[10px] font-bold text-center truncate">${ch.name}</p>
                    </div>
                `).join('');
            } catch(e) { console.log("JSON ফাইলটি ফোল্ডারে চেক করুন"); }
        }
        loadData();
    </script>
</body>
</html>
