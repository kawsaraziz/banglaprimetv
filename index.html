<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        #startup-poster { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        
        .header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .search-input { padding: 5px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; }
        
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .left-section { flex: 3; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; }
        #poster-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        
        .scroll-wrapper { margin: 10px 0; padding: 5px 15px; border: 1px solid #444; border-radius: 20px; background: #111; }
        
        /* চ্যানেল লিস্টের ডিজাইন */
        .channel-sidebar { width: 350px; border-left: 1px solid #333; overflow-y: auto; padding: 15px; }
        .channel-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .channel-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: #111; border-radius: 12px; border: 1px solid #333; cursor: pointer; }
        .channel-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        /* মোবাইল/পোর্ট্রেট ভিউ ফিক্স */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .channel-sidebar { width: 100%; border-left: none; border-top: 1px solid #333; height: auto; }
            .channel-list { grid-template-columns: repeat(3, 1fr); }
            .channel-item { aspect-ratio: 1/1; flex-direction: column; justify-content: center; text-align: center; font-size: 11px; }
            .channel-logo { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div id="startup-poster"><img src="STARTUP_LINK" alt="Loading..."></div>

    <div class="header">
        <div>📺 <b>বাংলা প্রাইম</b></div>
        <input type="text" class="search-input" placeholder="সার্চ...">
    </div>

    <div class="wrapper">
        <div class="left-section">
            <div class="video-box">
                <img id="poster-img" src="" alt="Poster">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee>স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
            
            <div id="mobile-channel-list" style="display:none;"></div>
        </div>

        <div class="channel-sidebar" id="desktop-channel-list">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        setTimeout(() => { document.getElementById('startup-poster').style.display = 'none'; }, 3000);

        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');
        const list = document.getElementById('channelList');

        fetch('channels.json').then(r => r.json()).then(data => {
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => { poster.src = ch.poster; poster.style.display = 'block'; play(ch.url); };
                list.appendChild(div);
                if(i === 0) { poster.src = ch.poster; play(ch.url); }
            });
        });

        function play(url) {
            video.onplay = () => poster.style.display = 'none';
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
