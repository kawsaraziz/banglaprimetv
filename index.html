<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Nahidflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .nav-active { color: #ff0000; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; padding: 20px; }
        .aspect-video { aspect-ratio: 16/9; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex items-center justify-between sticky top-0 bg-black z-50">
        <i class="fas fa-bars text-xl" onclick="toggleMenu()"></i>
        <h1 class="text-red-600 font-bold text-2xl tracking-tighter">NAHIDFLIX</h1>
        <i class="fas fa-search"></i>
    </header>

    <div class="px-4 mb-4">
        <div class="aspect-video w-full bg-black rounded-xl overflow-hidden border border-gray-800">
            <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div id="catBar" class="flex gap-2 px-4 py-2 overflow-x-auto"></div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4 p-4"></div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 p-4 flex justify-around text-gray-500 z-50">
        <button class="nav-active flex flex-col items-center text-xs"><i class="fas fa-home text-lg"></i> Home</button>
        <button class="flex flex-col items-center text-xs"><i class="fas fa-search text-lg"></i> Search</button>
        <button class="flex flex-col items-center text-xs"><i class="fas fa-heart text-lg"></i> Favs</button>
        <button class="flex flex-col items-center text-xs" onclick="toggleMenu()"><i class="fas fa-bars text-lg"></i> Menu</button>
    </nav>

    <div id="sideMenu" class="menu-overlay">
        <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        <div class="mt-10 space-y-4 text-xl">
            <p onclick="filter('All'); toggleMenu()">সব চ্যানেল</p>
            <p>সেটিংস</p>
        </div>
    </div>

    <script>
        let allChannels = [];

        async function loadChannels() {
            try {
                const response = await fetch('channels.json');
                allChannels = await response.json();
                renderGrid(allChannels);
                renderCats();
            } catch (e) { console.error("JSON লোড হয়নি!", e); }
        }

        function renderGrid(data) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = data.map(ch => `
                <div class="bg-gray-900 p-4 rounded-xl text-center" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-xs truncate">${ch.name}</p>
                </div>
            `).join('');
        }

        function play(url) {
            const p = document.getElementById('mainPlayer');
            p.src = url + (url.includes('?') ? '&' : '?') + 'autoplay=1';
        }

        function renderCats() {
            const cats = ['All', ...new Set(allChannels.map(c => c.category))];
            document.getElementById('catBar').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="bg-gray-800 px-4 py-1 rounded-full text-xs">${c}</button>`
            ).join('');
        }

        function filter(c) {
            renderGrid(c === 'All' ? allChannels : allChannels.filter(x => x.category === c));
        }

        function toggleMenu() {
            const m = document.getElementById('sideMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        loadChannels();
    </script>
</body>
</html>
