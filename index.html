<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* হেডার: পুরোপুরি স্থির */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; flex-shrink: 0; background: var(--bg); }
        .search-box { padding: 5px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; }
        
        /* মেইন বডি */
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        /* বামপাশ: প্লেয়ার + টেক্সট বক্স (স্থির) */
        .left-section { flex: 4; display: flex; flex-direction: column; padding: 15px; min-width: 0; }
        .video-box { width: 100%; max-height: 70vh; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; display: block; }
        
        /* ওয়াটারমার্ক: পুরো স্ক্রিনে এনিমেশন */
        .watermark { position: absolute; top: 10%; left: 10%; font-size: 5vw; font-weight: bold; color: rgba(255, 255, 255, 0.1); pointer-events: none; animation: move 10s linear infinite; z-index: 10; }
        @keyframes move { 0% { transform: translate(0, 0); } 50% { transform: translate(50vw, 30vh); } 100% { transform: translate(0, 0); } }

        /* স্ক্রল বক্স */
        .scroll-wrapper { margin-top: 10px; padding: 10px 15px; border: 1px solid #444; border-radius: 20px; background: #111; }

        /* ডানপাশ: চ্যানেল লিস্ট (স্ক্রল হবে) */
        .channel-sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; border-left: 1px solid #333; overflow: hidden; }
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: start; }
        
        .channel-item { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; border-radius: 12px; cursor: pointer; border: 1px solid #333; text-align: center; }
        .channel-logo { width: 50%; aspect-ratio: 1/1; border-radius: 50%; margin-bottom: 5px; object-fit: cover; background: #333; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            .channel-list { grid-template-columns: repeat(3, 1fr); }
            .watermark { font-size: 8vw; }
        }
    </style>
</head>
<body>

    <div class="header">📺 <b>MEDIA</b> <input type="text" class="search-box" placeholder="সার্চ..."></div>

    <div class="wrapper">
        <div class="left-section">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee class="scrolling-text">স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => play(ch.url);
                list.appendChild(div);
            });
            if(data.length > 0) play(data[0].url);
        });

        function play(url) {
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
