<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 16px; }
        .channel-card { border: 2px solid #ff0000; padding: 10px; text-align: center; border-radius: 8px; position: relative; }
        .on-air { color: #ff0000; font-size: 10px; font-weight: bold; position: absolute; top: 5px; left: 5px; }
        .player-sticky { position: sticky; top: 0; z-index: 50; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center bg-black">
        <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
        <i class="fas fa-search text-xl" onclick="toggleSearch()"></i>
    </header>

    <div class="player-sticky w-full aspect-video bg-black border-b-2 border-red-600">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay"></iframe>
    </div>

    <div id="catBar" class="flex gap-4 p-4 overflow-x-auto">
        <button onclick="renderAll()" class="bg-red-600 px-4 py-1 rounded-full text-xs">All</button>
        </div>

    <div class="px-4 mt-4">
        <h2 class="font-bold mb-2">Continue Watching</h2>
        <div id="continueRow" class="flex gap-4 overflow-x-auto pb-4"></div>
    </div>

    <div id="channelGrid" class="grid-container"></div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-red-900 flex justify-around p-4 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <script>
        let channels = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];
        let history = JSON.parse(localStorage.getItem('history')) || [];

        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); });

        function renderAll(data = channels) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = data.map(ch => `
                <div class="channel-card" onclick="play('${ch.url}', ${ch.id})">
                    ${ch.isLive ? '<span class="on-air">● LIVE</span>' : ''}
                    <img src="${ch.logo}" class="w-12 h-12 mx-auto mb-2">
                    <p class="text-xs">${ch.name}</p>
                    <i class="fas fa-heart ${favs.includes(ch.id) ? 'text-red-500' : 'text-gray-500'} absolute bottom-2 right-2" onclick="toggleFav(${ch.id}, event)"></i>
                </div>
            `).join('');
        }

        function play(url, id) {
            document.getElementById('mainPlayer').src = url + "?autoplay=1";
            if(!history.includes(id)) { history.unshift(id); localStorage.setItem('history', JSON.stringify(history.slice(0, 5))); }
            renderHistory();
        }

        function toggleFav(id, e) {
            e.stopPropagation();
            favs.includes(id) ? favs = favs.filter(f => f !== id) : favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            renderAll();
        }

        function renderHistory() {
            const row = document.getElementById('continueRow');
            row.innerHTML = history.map(id => {
                const ch = channels.find(c => c.id === id);
                return ch ? `<div class="min-w-[80px] bg-gray-900 p-2 text-center text-[10px] rounded">${ch.name}</div>` : '';
            }).join('');
        }
    </script>
</body>
</html>
