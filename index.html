<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* হেডার */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        
        /* মেইন লেআউট */
        .wrapper { display: flex; height: calc(100vh - 60px); }
        
        /* বামপাশ (প্লেয়ার + স্ক্রল বক্স) */
        .left-section { flex: 4; display: flex; flex-direction: column; padding: 15px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        
        /* ওয়াটারমার্ক */
        .watermark { position: absolute; top: 15px; right: 20px; font-weight: bold; animation: pulse 2s infinite; z-index: 10; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* স্ক্রল বক্স */
        .scroll-wrapper { margin: 10px 0; padding: 8px 15px; border: 1px solid #444; border-radius: 20px; background: #111; }

        /* ডানপাশ (চ্যানেল লিস্ট) */
        .channel-sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; border-left: 1px solid #333; overflow: hidden; }
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        /* স্কয়ার চ্যানেল আইটেম */
        .channel-item { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; border-radius: 12px; cursor: pointer; border: 1px solid #333; text-align: center; font-size: 12px; }
        .channel-logo { width: 50%; aspect-ratio: 1/1; border-radius: 50%; margin-bottom: 8px; object-fit: cover; background: #333; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            .channel-list { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="header">📺 <b>MEDIA</b> <input type="text" class="search-box" placeholder="সার্চ..."></div>

    <div class="wrapper">
        <div class="left-section">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <img id="poster-img" src="" alt="Poster">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="scroll-wrapper"><marquee class="scrolling-text">স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');

        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => { poster.src = ch.poster; poster.style.display = 'block'; play(ch.url); };
                list.appendChild(div);
                if(i === 0) { poster.src = ch.poster; play(ch.url); }
            });
        });

        function play(url) {
            video.onplay = () => poster.style.display = 'none';
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
