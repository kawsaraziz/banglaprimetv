<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; }
        .fixed-top { position: fixed; top: 0; width: 100%; z-index: 1000; background: #000; }
        .content-body { margin-top: 250px; } /* প্লেয়ার ও হেডারের উচ্চতা অনুযায়ী */
        .grid-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { border: 2px solid #ff0000; padding: 10px; border-radius: 8px; position: relative; text-align: center; cursor: pointer; }
        .menu-overlay { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 2000; transition: 0.3s; padding: 20px; }
        .menu-overlay.active { left: 0; }
    </style>
</head>
<body>

    <div class="fixed-top">
        <header class="p-4 flex justify-between items-center">
            <h1 class="text-red-600 font-bold text-xl">NAHIDFLIX</h1>
            <input type="text" id="searchBox" onkeyup="searchCh()" placeholder="Search..." class="bg-gray-800 p-1 text-sm rounded w-24">
        </header>
        <div class="w-full aspect-video bg-black border-b-2 border-red-600">
            <iframe id="mainPlayer" src="" class="w-full h-full" allowfullscreen></iframe>
        </div>
    </div>

    <div class="content-body pb-24">
        <div id="channelGrid" class="grid-box"></div>
    </div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-red-900 flex justify-around p-4 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="document.getElementById('sideMenu').classList.add('active')"><i class="fas fa-bars"></i></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <div id="sideMenu" class="menu-overlay">
        <button onclick="document.getElementById('sideMenu').classList.remove('active')" class="text-2xl"><i class="fas fa-times"></i></button>
        <div id="menuCats" class="mt-10 space-y-4"></div>
    </div>

    <script>
        let channels = [], favs = JSON.parse(localStorage.getItem('favs')) || [];
        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); renderMenu(); });

        function renderAll(data = channels) {
            document.getElementById('channelGrid').innerHTML = data.map(ch => `
                <div class="card" onclick="play('${ch.url}')">
                    <img src="${ch.logo}" class="w-12 h-12 mx-auto">
                    <p class="text-xs mt-2">${ch.name}</p>
                    <i class="fas fa-heart absolute bottom-1 right-1 ${favs.includes(ch.id) ? 'text-red-500' : 'text-gray-500'}" 
                       onclick="toggleFav(${ch.id}, event)"></i>
                </div>`).join('');
        }

        function toggleFav(id, e) {
            e.stopPropagation();
            favs.includes(id) ? favs = favs.filter(f => f !== id) : favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            renderAll();
        }

        function play(url) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }
        function showFavs() { renderAll(channels.filter(c => favs.includes(c.id))); }
        function renderMenu() {
            const cats = [...new Set(channels.map(c => c.category))];
            document.getElementById('menuCats').innerHTML = cats.map(c => 
                `<div onclick="filter('${c}'); document.getElementById('sideMenu').classList.remove('active')">${c}</div>`).join('');
        }
        function filter(cat) { renderAll(channels.filter(c => c.category === cat)); }
        function searchCh() {
            const val = document.getElementById('searchBox').value.toLowerCase();
            renderAll(channels.filter(c => c.name.toLowerCase().includes(val)));
        }
    </script>
</body>
</html>
