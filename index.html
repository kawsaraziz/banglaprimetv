<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 16px; }
        .channel-card { border: 2px solid #ff0000; padding: 10px; border-radius: 8px; position: relative; }
        .on-air { background: #ff0000; font-size: 8px; padding: 2px 4px; position: absolute; top: 5px; left: 5px; }
        .player-sticky { position: sticky; top: 0; z-index: 50; }
        .side-menu { transform: translateX(-100%); transition: 0.3s; }
        .side-menu.active { transform: translateX(0); }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center bg-black">
        <h1 class="text-red-600 font-bold text-xl">NAHIDFLIX</h1>
        <input type="text" id="searchBox" onkeyup="searchCh()" placeholder="Search..." class="bg-[#1a1a1a] p-1 rounded text-sm w-24">
    </header>

    <div class="player-sticky w-full aspect-video bg-black border-b-2 border-red-600">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay"></iframe>
    </div>

    <div id="catBar" class="flex gap-4 p-4 overflow-x-auto"></div>

    <div id="channelGrid" class="grid-container"></div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-red-900 flex justify-around p-4 z-50">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="document.getElementById('sideMenu').classList.add('active')"><i class="fas fa-bars"></i></button>
        <button onclick="showFavs()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <div id="sideMenu" class="side-menu fixed inset-0 bg-black z-[100] p-6">
        <button onclick="document.getElementById('sideMenu').classList.remove('active')" class="mb-10 text-2xl"><i class="fas fa-times"></i></button>
        <div id="menuCategories" class="space-y-6"></div>
    </div>

    <script>
        let channels = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];

        fetch('channels.json').then(r => r.json()).then(data => { channels = data; renderAll(); });

        function renderAll(data = channels) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = data.map(ch => `
                <div class="channel-card" onclick="play('${ch.url}', ${ch.id})">
                    ${ch.isLive ? '<span class="on-air">LIVE</span>' : ''}
                    <img src="${ch.logo}" class="w-12 h-12 mx-auto mb-2">
                    <p class="text-xs text-center">${ch.name}</p>
                    <i class="fas fa-heart ${favs.includes(ch.id) ? 'text-red-500' : 'text-gray-500'} absolute bottom-2 right-2" 
                       onclick="toggleFav(${ch.id}, event)"></i>
                </div>
            `).join('');
            
            // ক্যাটাগরি মেনু তৈরি
            const cats = [...new Set(channels.map(c => c.category))];
            document.getElementById('menuCategories').innerHTML = cats.map(c => 
                `<div onclick="filter('${c}'); document.getElementById('sideMenu').classList.remove('active')" class="text-xl border-b border-gray-800 pb-2">${c}</div>`
            ).join('');
        }

        function toggleFav(id, e) {
            e.stopPropagation();
            if(favs.includes(id)) favs = favs.filter(f => f !== id);
            else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            renderAll(); // রি-রেন্ডার করে হার্ট আইকন আপডেট করা
        }

        function play(url, id) { document.getElementById('mainPlayer').src = url + "?autoplay=1"; }
        function filter(cat) { renderAll(channels.filter(c => c.category === cat)); }
        function searchCh() {
            const v = document.getElementById('searchBox').value.toLowerCase();
            renderAll(channels.filter(c => c.name.toLowerCase().includes(v)));
        }
        function showFavs() { renderAll(channels.filter(c => favs.includes(c.id))); }
    </script>
</body>
</html>
