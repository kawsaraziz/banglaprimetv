<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Nahidflix TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; }
        .channel-card { background: #111; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body class="p-4">

    <div class="aspect-video w-full bg-black mb-4">
        <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div id="channelGrid" class="grid grid-cols-2 gap-4"></div>

    <script>
        // চ্যানেল লোড করার ফাংশন
        async function loadData() {
            try {
                const response = await fetch('channels.json');
                if (!response.ok) throw new Error("JSON ফাইলটি পাওয়া যাচ্ছে না!");
                
                const channels = await response.json();
                renderChannels(channels);
            } catch (error) {
                console.error("এরর:", error);
                document.getElementById('channelGrid').innerHTML = `<p class="col-span-2 text-red-500">চ্যানেল পাওয়া যায়নি! দয়া করে Live Server ব্যবহার করুন।</p>`;
            }
        }

        function renderChannels(list) {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = list.map(ch => `
                <div class="channel-card" onclick="document.getElementById('mainPlayer').src='${ch.url}?autoplay=1'">
                    <img src="${ch.logo}" class="w-12 h-12 mx-auto mb-2">
                    <p class="text-xs">${ch.name}</p>
                </div>
            `).join('');
        }

        // লোড শুরু করুন
        loadData();
    </script>
</body>
</html>
