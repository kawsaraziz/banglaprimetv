<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <span>Bangla Prime</span>
        <input type="text" class="search-box" placeholder="চ্যানেল সার্চ করুন...">
    </header>

    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" style="color: #1877f2;"><i class="fas fa-home"></i></a>
        <a href="video.html" style="color: #65676b;"><i class="fas fa-video"></i></a>
    </nav>

    <script>
        // চ্যানেল লোড করার ফাংশন
        async function loadFeed() {
            try {
                const res = await fetch('channels.json');
                const data = await res.json();
                const feed = document.getElementById('feed');

                data.forEach((ch, i) => {
                    const card = document.createElement('div');
                    card.className = "card";
                    card.innerHTML = `
                        <div class="header-info">
                            <div class="profile-img"></div>
                            <div class="channel-name">${ch.name}</div>
                        </div>
                        <video id="v-${i}" controls playsinline></video>
                        <div style="padding: 10px; font-size: 14px; color: #444;">
                            <i class="fas fa-thumbs-up"></i> লাইক  &nbsp; 
                            <i class="fas fa-comment"></i> কমেন্ট &nbsp; 
                            <i class="fas fa-share"></i> শেয়ার
                        </div>
                    `;
                    feed.appendChild(card);
                    
                    // ভিডিও প্লেয়ার ইনিশিয়ালাইজেশন
                    const v = document.getElementById(`v-${i}`);
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(ch.url);
                        hls.attachMedia(v);
                    }
                });
            } catch (err) {
                console.error("ডেটা লোড হতে সমস্যা হয়েছে", err);
            }
        }
        loadFeed();
    </script>
</body>
</html>
