<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahidflix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* লকিং সিস্টেম */
        .header-player-wrapper { position: sticky; top: 0; z-index: 1000; background: #000; }
        .cat-scroll { 
            display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; 
            background: #000; position: sticky; top: 220px; z-index: 999; border-bottom: 1px solid #222;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        
        /* গ্লোয়িং ভাইব */
        .channel-card { 
            padding: 15px; text-align: center; cursor: pointer;
            background: rgba(0, 0, 0, 0.8); border-radius: 15px;
            box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.3);
            transition: 0.3s;
        }
        .active-cat { background: #ff0000 !important; color: white; }
        
        /* মেনু স্টাইল */
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; padding: 20px; }
    </style>
</head>
<body class="pb-24">

    <div class="header-player-wrapper">
        <header class="p-4 flex justify-between items-center border-b border-red-900/30">
            <h1 class="text-red-600 font-bold text-2xl">NAHIDFLIX</h1>
            <p style="font-family: cursive;" class="text-[10px] text-red-600">Powered By Kawsar Aziz</p>
        </header>
        <div class="aspect-video w-full">
            <iframe id="mainPlayer" src="" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div class="cat-scroll" id="catBar"></div>

    <div id="channelGrid" class="grid grid-cols-2 gap-6 p-6 mt-2"></div>

    <footer class="fixed bottom-0 w-full bg-black/90 p-4 flex justify-around items-center z-[2000]">
        <button onclick="location.reload()"><i class="fas fa-home text-xl"></i></button>
        <input type="text" id="footerSearch" onkeyup="searchCh()" placeholder="Search..." class="w-2/3 bg-black py-2 px-4 rounded-full text-sm border border-red-900 outline-none">
        <button onclick="toggleSideMenu()"><i class="fas fa-bars text-xl"></i></button>
