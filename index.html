<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime Tv</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; }
        .scroll-x { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .channel-card { min-width: 120px; border: 2px solid #ef4444; border-radius: 10px; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black z-50">
        <button onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <a href="#" onclick="location.reload()" class="text-red-600 font-bold text-xl">BANGLA PRIME TV</a>
        <input type="text" id="searchInput" placeholder="Search..." class="bg-gray-800 p-1 rounded text-sm w-24" onkeyup="searchChannels()">
    </header>

    <div id="sideMenu" class="hidden fixed left-0 top-0 h-full w-48 bg-gray-900 p-5 z-50">
        <button onclick="toggleMenu()" class="mb-5"><i class="fas fa-times"></i></button>
        <div id="categoryMenu" class="space-y-3"></div>
    </div>

    <div class="p-4">
        <div class="aspect-video bg-gray-900 rounded-lg flex items-center justify-center border-2 border-red-600">
            <p id="playerStatus">Select a channel</p>
        </div>
    </div>

    <div id="mainContainer" class="p-4 space-y-6"></div>

    <footer class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around p-4">
        <button onclick="location.reload()"><i class="fas fa-home"></i></button>
        <button onclick="document.getElementById('searchInput').focus()"><i class="fas fa-search"></i></button>
        <button onclick="showFavorites()"><i class="fas fa-heart text-red-500"></i></button>
    </footer>

    <script>
        let favorites = JSON.parse(localStorage.getItem('favs')) || [];
        
        // আপনার JSON ডেটা এখানে আসবে
        const channels = [
            { id: 1, name: "Ananda TV", category: "Bangla", isLive: true },
            { id: 2, name: "T-Sports", category: "Sports", isLive: false },
            { id: 3, name: "Somoy News", category: "News", isLive: true }
        ];

        function render() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '';
            const categories = [...new Set(channels.map(c => c.category))];

            categories.forEach(cat => {
                container.innerHTML += `<div><h2 class="font-bold mb-2">${cat}</h2><div class="scroll-x" id="cat-${cat}"></div></div>`;
                const row = document.getElementById(`cat-${cat}`);
                channels.filter(c => c.category === cat).forEach(ch => {
                    row.innerHTML += `
                        <div class="channel-card" onclick="play('${ch.name}')">
                            <i class="fas fa-heart ${favorites.includes(ch.id) ? 'text-red-500' : 'text-gray-500'}" onclick="toggleFav(${ch.id}, event)"></i>
                            <div class="mt-2 text-xs">${ch.name}</div>
                            ${ch.isLive ? '<span class="text-[8px] bg-red-600 px-1 mt-1 block">ON AIR</span>' : ''}
                        </div>`;
                });
            });
        }

        function toggleFav(id, e) {
            e.stopPropagation();
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favs', JSON.stringify(favorites));
            render();
        }

        function searchChannels() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.channel-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }
        function play(name) { document.getElementById('playerStatus').innerText = "Playing: " + name; }
        
        render();
    </script>
</body>
</html>
