<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Prime TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #050505; color: #ccc; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* হেডার */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; z-index: 1000; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; }
        #search { padding: 6px 12px; background: #111; border: 1px solid #333; border-radius: 20px; color: #fff; width: 120px; }

        /* প্লেয়ার ও ওয়াটারমার্ক */
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        #videoPlayer { width: 100%; height: 100%; }
        .watermark { position: absolute; top: 10%; left: 10%; font-size: 2vw; color: #fff; opacity: 0.4; pointer-events: none; z-index: 500; animation: moveAnim 20s linear infinite; }
        @keyframes moveAnim { 0%, 100% { top: 10%; left: 10%; } 50% { top: 80%; left: 80%; } }

        /* সাইড মেনু */
        .trigger { position: fixed; left: 0; top: 0; width: 40px; height: 100%; z-index: 2000; }
        .drawer { height: 100%; width: 0; position: fixed; z-index: 2001; top: 0; left: 0; background: #0a0a0a; transition: 0.3s; overflow-y: auto; border-right: 1px solid #222; }
        .trigger:hover + .drawer, .drawer:hover { width: 250px; }
        .drawer-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #111; }

        /* নিউজ টিকার */
        .ticker-wrapper { padding: 3px; background: linear-gradient(90deg, #ff0000, #00a8e1, #ff0000); background-size: 400%; animation: gradientMove 5s infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .ticker-bg { background: #000; padding: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .card { background: #111; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/Rakib49/Rakibiptv/main/images%20(11).jpeg" class="logo-img">
    <input type="text" id="search" placeholder="সার্চ..." onkeyup="search()">
</div>

<div class="player-wrapper">
    <div class="watermark">Bangla Prime TV</div>
    <video id="videoPlayer" controls autoplay playsinline muted></video>
</div>

<div class="ticker-wrapper"><div class="ticker-bg"><marquee>ব্রেকিং নিউজ: বাংলা প্রাইম টিভিতে স্বাগতম! | অ্যারো কি দিয়ে চ্যানেল বদলান | কপিরাইট © আজিজুল হক কাওসার</marquee></div></div>

<div class="trigger"></div>
<div class="drawer" id="drawer">
    <div style="padding:15px; font-weight:bold;">চ্যানেল তালিকা</div>
    <div id="drawerList"></div>
</div>

<div class="grid" id="grid"></div>

<script>
    let channels = [];
    fetch('channels.json').then(r => r.json()).then(d => {
        channels = d;
        render(d);
    });

    function render(d) {
        document.getElementById('grid').innerHTML = d.map(c => `<div class="card" onclick="play('${c.url}')"><img src="${c.logo}" width="40"><div style="font-size:11px">${c.name}</div></div>`).join('');
        document.getElementById('drawerList').innerHTML = d.map(c => `<div class="drawer-item" onclick="play('${c.url}')"><img src="${c.logo}" width="25" style="margin-right:10px">${c.name}</div>`).join('');
    }

    function play(url) {
        const v = document.getElementById('videoPlayer');
        v.muted = false;
        const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v); v.play();
    }
    
    function search() {
        let val = document.getElementById('search').value.toLowerCase();
        render(channels.filter(c => c.name.toLowerCase().includes(val)));
    }
</script>
</body>
</html>
