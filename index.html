<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #333; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        /* পোর্ট্রেট মোডের জন্য ফিক্সড হাইট */
        .main-section { flex: 3; padding: 10px; display: flex; flex-direction: column; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; position: relative; overflow: hidden; }
        #videoPlayer { width: 100%; height: 100%; }

        .sidebar { width: 300px; border-left: 1px solid #333; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; border: 1px solid #333; margin-bottom: 8px; cursor: pointer; border-radius: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .channel-item:hover { background: #222; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .main-section { height: 300px; flex: none; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>📺 বাংলা প্রাইম</div>
        <input type="text" placeholder="সার্চ...">
    </div>

    <div class="wrapper">
        <div class="main-section">
            <div class="video-box">
                <video id="videoPlayer" controls autoplay></video>
            </div>
        </div>
        <div class="sidebar" id="channelList">
            </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const list = document.getElementById('channelList');

        // আপনার চ্যানেলের ডাটা এখানে সরাসরি লিখুন
        const channels = [
            { "name": "Bangla Prime 1", "logo": "https://via.placeholder.com/50", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { "name": "Bangla Prime 2", "logo": "https://via.placeholder.com/50", "url": "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        function renderChannels() {
            list.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" width="40" style="border-radius:50%"> ${ch.name}`;
                div.onclick = () => playVideo(ch.url);
                list.appendChild(div);
            });
        }

        function playVideo(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            } else { video.src = url; }
        }

        renderChannels();
    </script>
</body>
</html>
