<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #050505; --text: #fff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* হেডার ও সার্চ (স্থির) */
        .header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .search-box { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #151515; color: #fff; width: 200px; }
        
        .wrapper { display: flex; height: calc(100vh - 70px); }
        
        /* প্লেয়ার সেকশন */
        .player-container { flex: 4; padding: 20px; display: flex; flex-direction: column; position: sticky; top: 70px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        #videoPlayer { width: 100%; height: 100%; }
        #poster-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        
        /* বাংলা প্রাইম ওয়াটারমার্ক */
        .watermark { position: absolute; top: 15px; right: 25px; color: #fff; font-weight: bold; font-size: 18px; animation: blink 2s infinite; z-index: 10; text-shadow: 2px 2px 4px #000; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* স্থির স্ক্রলিং টেক্সট */
        .fixed-scroll { padding: 15px 0; background: var(--bg); }
        
        /* স্টার্টআপ পোস্টার (পোর্ট্রেট) */
        #startup-poster { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; justify-content: center; align-items: center; }
        #startup-poster img { width: 100%; height: 100%; object-fit: cover; }

        /* চ্যানেল লিস্ট (স্ক্রল হবে) */
        .channel-sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid #333; }
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .channel-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: #111; border-radius: 8px; cursor: pointer; border: 1px solid #333; }
        .channel-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #444; }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .wrapper { flex-direction: column; height: auto; }
            #startup-poster { display: flex; }
            .channel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .channel-item { flex-direction: column; text-align: center; font-size: 11px; padding: 8px; }
            .channel-logo { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div id="startup-poster"><img src="STARTUP_POSTER_LINK" alt="Loading..."></div>

    <div class="header">📺 <b>MEDIA</b> <input type="text" class="search-box" placeholder="সার্চ..."></div>

    <div class="wrapper">
        <div class="player-container">
            <div class="video-box">
                <div class="watermark">বাংলা প্রাইম</div>
                <img id="poster-img" src="" alt="Poster">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="fixed-scroll"><marquee>স্বাগতম! চ্যানেল বাছাই করুন...</marquee></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        // স্টার্টআপ পোস্টার ৩ সেকেন্ড
        setTimeout(() => { document.getElementById('startup-poster').style.display = 'none'; }, 3000);

        const video = document.getElementById('videoPlayer');
        const poster = document.getElementById('poster-img');

        fetch('channels.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<img src="${ch.logo}" class="channel-logo"><span>${ch.name}</span>`;
                div.onclick = () => { poster.src = ch.poster; poster.style.display = 'block'; play(ch.url); };
                list.appendChild(div);
                if(i === 0) { poster.src = ch.poster; play(ch.url); }
            });
        });

        function play(url) {
            video.onplay = () => poster.style.display = 'none';
            if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); }
            else video.src = url;
        }
    </script>
</body>
</html>
