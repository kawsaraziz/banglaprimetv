<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Video Tab</title>
    <style>
        body { background: #000; margin: 0; }
        .vid-container { display: flex; flex-direction: column; }
        .item { height: 300px; margin-bottom: 20px; position: relative; }
        video { width: 100%; height: 100%; background: #000; }
        .rotate-icon { position: absolute; top: 10px; right: 10px; color: white; font-size: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="v-feed" class="vid-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const channels = [{url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"}];
        const feed = document.getElementById('v-feed');
        channels.forEach((ch, i) => {
            feed.innerHTML += `<div class="item"><video id="v-${i}" playsinline></video><i class="fas fa-expand rotate-icon" onclick="full(${i})"></i></div>`;
            const v = document.getElementById(`v-${i}`); const hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(v);
        });
        function full(i) {
            const v = document.getElementById(`v-${i}`);
            v.requestFullscreen();
            if(screen.orientation) screen.orientation.lock('landscape');
        }
    </script>
</body>
</html>
