<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tab</title>
    <style>
        body { background: #000; margin: 0; }
        .vid-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .item { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; position: relative; }
        video { width: 100%; height: auto; }
        .full-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="v-feed" class="vid-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        fetch('channels.json').then(r => r.json()).then(data => {
            const feed = document.getElementById('v-feed');
            data.forEach((ch, i) => {
                feed.innerHTML += `<div class="item"><video id="v-${i}" playsinline></video><i class="fas fa-expand full-btn" onclick="document.getElementById('v-${i}').requestFullscreen()"></i></div>`;
                const v = document.getElementById(`v-${i}`);
                const hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(v);
            });
        });
    </script>
</body>
</html>
