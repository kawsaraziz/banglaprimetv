<div id="video-feed" style="background:#000;"></div>
<script>
    fetch('channels.json').then(r => r.json()).then(data => {
        data.forEach((ch, i) => {
            document.getElementById('video-feed').innerHTML += `
                <div style="margin-bottom: 20px; position: relative;">
                    <video id="v-${i}" playsinline style="width:100%; height: 300px; object-fit: cover;"></video>
                    <i class="fas fa-expand" onclick="goLandscape('v-${i}')" style="position:absolute; top:10px; right:10px; color:#fff; font-size:20px;"></i>
                </div>`;
            const v = document.getElementById(`v-${i}`);
            const hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(v);
        });
    });
    function goLandscape(id) {
        const v = document.getElementById(id);
        v.requestFullscreen();
        if(screen.orientation) screen.orientation.lock('landscape');
    }
</script>
